MEMORY {
	ZP:			start = $0000, size = $0100, type = rw;
	BASROM:		start = $C000, size = $3000, fill = yes, fillval=$FF, file = %O;
    MONITOR:    start = $F000, size = $0300, fill = yes, fillval=$FF, file = %O;	
    IOHANDLER:	start = $F300, size = $CFA, fill = yes, fillval=$FF, file = %O;
	VECTS:		start = $FFFA, size = $6, fill = yes, fillval=$FF, file = %O;
}

SEGMENTS {
	ZEROPAGE:	load = ZP, type = zp;
	CODE:		load = BASROM,	type = ro;
    WOZMON:     load = MONITOR, type = ro;
	IOHANDLER:	load = IOHANDLER, type = ro;
	VECTS:		load = VECTS,	type = ro;
}

